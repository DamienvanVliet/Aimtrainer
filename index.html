<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>AimLab 3D — Valorant Warmup</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0f;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;color:#eee;user-select:none}
        canvas{display:block}

        /* ── Crosshair ── */
        #crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:15}
        .ch-line{position:absolute;background:#0f0}
        .ch-top{left:50%;transform:translateX(-50%);bottom:50%}
        .ch-bot{left:50%;transform:translateX(-50%);top:50%}
        .ch-left{top:50%;transform:translateY(-50%);right:50%}
        .ch-right{top:50%;transform:translateY(-50%);left:50%}
        .ch-dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%}

        /* ── HUD ── */
        #hud{position:fixed;top:0;left:0;width:100%;padding:8px 16px;display:flex;justify-content:space-between;align-items:center;pointer-events:none;z-index:10;font-size:14px}
        #hud>*{pointer-events:auto}
        #fps-box{background:rgba(0,0,0,.65);padding:4px 12px;border-radius:6px;font-weight:bold;font-size:15px;color:#0f0}
        #stats-box{background:rgba(0,0,0,.65);padding:4px 12px;border-radius:6px}
        #timer-box{position:fixed;top:50px;left:50%;transform:translateX(-50%);font-size:32px;font-weight:bold;color:#ff4455;text-shadow:0 0 12px rgba(255,68,85,.6);pointer-events:none;z-index:10;display:none}

        /* ── Hitmarker ── */
        #hitmarker{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:16;opacity:0;transition:opacity .08s}
        #hitmarker.show{opacity:1}
        #hitmarker svg{width:30px;height:30px}

        /* ── Glock overlay ── */
        #weapon{position:fixed;bottom:-10px;right:5%;pointer-events:none;z-index:8;transition:transform .06s}
        #weapon.recoil{transform:translateY(-12px) rotate(-4deg)}

        /* ── Menu ── */
        .overlay{position:fixed;inset:0;background:rgba(6,6,12,.92);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;z-index:20;overflow-y:auto;padding:30px 20px}
        .overlay.hidden{display:none}
        .overlay h1{font-size:42px;color:#ff4455;margin-bottom:4px;letter-spacing:1px}
        .overlay h2{font-size:15px;color:#777;margin-bottom:24px}
        .section-title{font-size:13px;text-transform:uppercase;letter-spacing:2px;color:#ff4455;margin:18px 0 8px;width:360px;text-align:left;border-bottom:1px solid #222;padding-bottom:4px}
        .menu-btn{padding:12px 0;font-size:16px;border:2px solid #ff4455;background:transparent;color:#ddd;border-radius:8px;cursor:pointer;transition:.2s;width:360px;text-align:center;margin:4px 0}
        .menu-btn:hover{background:#ff4455;color:#fff}
        .menu-btn.selected{background:#ff4455;color:#fff}
        .row{display:flex;gap:8px;width:360px}
        .row .menu-btn{flex:1}
        .slider-group{display:flex;flex-direction:column;align-items:center;gap:2px;width:360px;margin:4px 0}
        .slider-group label{font-size:13px;color:#aaa;width:100%;display:flex;justify-content:space-between}
        .slider-group input[type=range]{width:100%;accent-color:#ff4455}
        .color-row{display:flex;align-items:center;gap:10px;width:360px;margin:4px 0}
        .color-row label{font-size:13px;color:#aaa}
        .color-row input[type=color]{width:40px;height:28px;border:none;background:transparent;cursor:pointer}
        .leaderboard{width:360px;background:rgba(255,255,255,.04);border-radius:8px;padding:12px;margin:6px 0;max-height:200px;overflow-y:auto}
        .lb-entry{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1a1a1a;font-size:13px}
        .lb-entry:last-child{border:none}
        .lb-rank{color:#ff4455;width:28px}.lb-mode{color:#aaa;flex:1}.lb-score{color:#0f0;width:60px;text-align:right}.lb-acc{color:#ff0;width:55px;text-align:right}
        kbd{background:#222;padding:2px 8px;border-radius:4px;font-size:11px;border:1px solid #333}
    </style>
</head>
<body>

<!-- Crosshair -->
<div id="crosshair">
    <div class="ch-line ch-top"></div>
    <div class="ch-line ch-bot"></div>
    <div class="ch-line ch-left"></div>
    <div class="ch-line ch-right"></div>
    <div class="ch-dot"></div>
</div>

<!-- Hitmarker -->
<div id="hitmarker">
    <svg viewBox="0 0 30 30">
        <line x1="8" y1="8" x2="12" y2="12" stroke="white" stroke-width="2"/>
        <line x1="22" y1="8" x2="18" y2="12" stroke="white" stroke-width="2"/>
        <line x1="8" y1="22" x2="12" y2="18" stroke="white" stroke-width="2"/>
        <line x1="22" y1="22" x2="18" y2="18" stroke="white" stroke-width="2"/>
    </svg>
</div>

<!-- HUD -->
<div id="hud">
    <div id="fps-box">FPS: 0</div>
    <div id="stats-box">Hits: 0 | Misses: 0 | Accuracy: —</div>
</div>
<div id="timer-box">30.0</div>

<!-- Glock weapon model (SVG) -->
<div id="weapon">
    <svg width="320" height="220" viewBox="0 0 320 220">
        <!-- Slide -->
        <rect x="60" y="50" width="200" height="42" rx="3" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
        <rect x="62" y="54" width="140" height="4" rx="1" fill="#0d0d0d"/>
        <!-- Serrations -->
        <g stroke="#2a2a2a" stroke-width="1.5">
            <line x1="220" y1="52" x2="220" y2="90"/><line x1="226" y1="52" x2="226" y2="90"/>
            <line x1="232" y1="52" x2="232" y2="90"/><line x1="238" y1="52" x2="238" y2="90"/>
            <line x1="244" y1="52" x2="244" y2="90"/><line x1="250" y1="52" x2="250" y2="90"/>
        </g>
        <!-- Barrel -->
        <rect x="255" y="58" width="30" height="26" rx="2" fill="#111" stroke="#333" stroke-width="1"/>
        <ellipse cx="285" cy="71" rx="8" ry="10" fill="#0a0a0a" stroke="#444" stroke-width="0.5"/>
        <!-- Ejection port -->
        <rect x="170" y="52" width="30" height="18" rx="1" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="0.5"/>
        <!-- Frame / lower -->
        <path d="M60,92 L260,92 L260,105 L190,105 L175,108 L60,108 Z" fill="#222" stroke="#333" stroke-width="1"/>
        <!-- Trigger guard -->
        <path d="M130,108 L165,108 L165,145 Q165,155 155,155 L140,155 Q130,155 130,145 Z" fill="none" stroke="#333" stroke-width="2"/>
        <!-- Trigger -->
        <line x1="150" y1="112" x2="148" y2="140" stroke="#555" stroke-width="3" stroke-linecap="round"/>
        <!-- Grip -->
        <path d="M90,108 L168,108 L162,200 Q160,210 150,212 L100,212 Q90,210 88,200 Z" fill="#1e1e1e" stroke="#333" stroke-width="1"/>
        <!-- Grip texture -->
        <g fill="#2a2a2a">
            <rect x="102" y="130" width="48" height="3" rx="1"/>
            <rect x="102" y="138" width="48" height="3" rx="1"/>
            <rect x="101" y="146" width="48" height="3" rx="1"/>
            <rect x="101" y="154" width="48" height="3" rx="1"/>
            <rect x="100" y="162" width="48" height="3" rx="1"/>
            <rect x="100" y="170" width="48" height="3" rx="1"/>
            <rect x="99" y="178" width="48" height="3" rx="1"/>
            <rect x="99" y="186" width="48" height="3" rx="1"/>
        </g>
        <!-- Magazine base -->
        <rect x="98" y="208" width="56" height="8" rx="2" fill="#111" stroke="#333" stroke-width="1"/>
        <!-- Front sight -->
        <rect x="258" y="44" width="6" height="8" rx="1" fill="#222"/>
        <rect x="259" y="43" width="4" height="2" fill="#0f0" opacity="0.7"/>
        <!-- Rear sight -->
        <rect x="78" y="44" width="18" height="8" rx="1" fill="#222"/>
        <rect x="80" y="42" width="3" height="3" fill="#eee" opacity="0.5"/>
        <rect x="91" y="42" width="3" height="3" fill="#eee" opacity="0.5"/>
    </svg>
</div>

<!-- ── MAIN MENU ── -->
<div class="overlay" id="menu">
    <h1>🎯 AimTrainer 3D</h1>
    <h2>Valorant Warmup Tool</h2>

    <div class="section-title">Training Mode</div>
    <button class="menu-btn mode-btn selected" data-mode="flick">⚡ Flick</button>
    <button class="menu-btn mode-btn" data-mode="tracking">🎯 Tracking / Drag</button>
    <button class="menu-btn mode-btn" data-mode="strafing">🏃 Strafing Targets</button>
    <button class="menu-btn mode-btn" data-mode="mixed">🔀 Mixed</button>

    <div class="section-title">Difficulty</div>
    <div class="row">
        <button class="menu-btn diff-btn" data-diff="easy">Easy</button>
        <button class="menu-btn diff-btn selected" data-diff="medium">Medium</button>
        <button class="menu-btn diff-btn" data-diff="hard">Hard</button>
    </div>

    <div class="section-title">Round Timer</div>
    <div class="row">
        <button class="menu-btn time-btn" data-time="30">30s</button>
        <button class="menu-btn time-btn selected" data-time="60">60s</button>
        <button class="menu-btn time-btn" data-time="90">90s</button>
        <button class="menu-btn time-btn" data-time="0">∞ Free</button>
    </div>

    <div class="section-title">Settings</div>
    <div class="slider-group">
        <label>Sensitivity <span id="sv">3.0</span></label>
        <input type="range" id="sens" min="0.5" max="10" step="0.1" value="3.0"/>
    </div>
    <div class="slider-group">
        <label>Volume <span id="vv">70%</span></label>
        <input type="range" id="vol" min="0" max="100" step="1" value="70"/>
    </div>

    <div class="section-title">Crosshair</div>
    <div class="color-row">
        <label>Color</label><input type="color" id="ch-color" value="#00ff00"/>
    </div>
    <div class="slider-group">
        <label>Size <span id="ch-sz-v">20</span>px</label>
        <input type="range" id="ch-sz" min="6" max="60" step="1" value="20"/>
    </div>
    <div class="slider-group">
        <label>Thickness <span id="ch-th-v">2</span>px</label>
        <input type="range" id="ch-th" min="1" max="8" step="1" value="2"/>
    </div>
    <div class="slider-group">
        <label>Gap <span id="ch-gp-v">4</span>px</label>
        <input type="range" id="ch-gp" min="0" max="20" step="1" value="4"/>
    </div>
    <div class="slider-group">
        <label>Dot size <span id="ch-dt-v">2</span>px (0 = off)</label>
        <input type="range" id="ch-dt" min="0" max="8" step="1" value="2"/>
    </div>
    <div class="slider-group">
        <label>Outline <span id="ch-ol-v">1</span>px (0 = off)</label>
        <input type="range" id="ch-ol" min="0" max="4" step="1" value="1"/>
    </div>

    <div class="section-title">Leaderboard (Top 10)</div>
    <div class="leaderboard" id="leaderboard"><div class="lb-entry" style="color:#555">No scores yet</div></div>
    <button class="menu-btn" id="clear-lb" style="border-color:#555;font-size:12px;padding:6px">Clear Leaderboard</button>

    <br/>
    <button class="menu-btn" id="start-btn" style="font-size:20px;padding:16px 0;margin-top:10px">▶ START TRAINING</button>
    <p style="color:#555;font-size:11px;margin-top:12px"><kbd>Esc</kbd> Return to menu &nbsp; <kbd>LMB</kbd> Shoot</p>
</div>

<!-- ── ROUND-END OVERLAY ── -->
<div class="overlay hidden" id="results">
    <h1 id="res-title">Round Complete!</h1>
    <br/>
    <div style="font-size:20px;line-height:2" id="res-body"></div>
    <br/>
    <button class="menu-btn" id="res-menu">Back to Menu</button>
    <button class="menu-btn" id="res-retry">Retry</button>
</div>

<!-- THREE.JS from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    /* ================================================================
       AimTrainer 3D — Three.js Valorant Warmup
       ================================================================ */

    // ─── Audio context (lazy init) ───
    let audioCtx = null;
    function ensureAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }

    function playSound(type){
        ensureAudio();
        const vol = +document.getElementById('vol').value / 100;
        if(vol===0) return;
        const g = audioCtx.createGain();
        g.gain.value = vol;
        g.connect(audioCtx.destination);

        if(type==='shoot'){
            // Gunshot: noise burst + low thump
            const dur = 0.12;
            const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*dur, audioCtx.sampleRate);
            const d = buf.getChannelData(0);
            for(let i=0;i<d.length;i++){
                const t=i/audioCtx.sampleRate;
                d[i]=(Math.random()*2-1)*Math.exp(-t*60)*0.7;
                d[i]+=Math.sin(t*220*Math.PI*2)*Math.exp(-t*40)*0.5;
            }
            const s=audioCtx.createBufferSource(); s.buffer=buf; s.connect(g); s.start();
        }
        else if(type==='hit'){
            // Metallic ping
            const o=audioCtx.createOscillator(); o.type='sine'; o.frequency.value=1800;
            o.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime+0.08);
            const eg=audioCtx.createGain(); eg.gain.value=0.25*vol; eg.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.15);
            o.connect(eg); eg.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.15);
            // Additional click
            const o2=audioCtx.createOscillator();o2.type='square';o2.frequency.value=3200;
            const eg2=audioCtx.createGain();eg2.gain.value=0.12*vol;eg2.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.04);
            o2.connect(eg2);eg2.connect(audioCtx.destination);o2.start();o2.stop(audioCtx.currentTime+0.04);
        }
        else if(type==='miss'){
            // Soft thud
            const o=audioCtx.createOscillator();o.type='sine';o.frequency.value=120;
            const eg=audioCtx.createGain();eg.gain.value=0.15*vol;eg.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);
            o.connect(eg);eg.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.1);
        }
        else if(type==='expire'){
            const o=audioCtx.createOscillator();o.type='sawtooth';o.frequency.value=300;
            o.frequency.exponentialRampToValueAtTime(100,audioCtx.currentTime+0.2);
            const eg=audioCtx.createGain();eg.gain.value=0.08*vol;eg.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);
            o.connect(eg);eg.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.2);
        }
        else if(type==='end'){
            [523,659,784].forEach((f,i)=>{
                const o=audioCtx.createOscillator();o.type='sine';o.frequency.value=f;
                const eg=audioCtx.createGain();eg.gain.value=0.18*vol;eg.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4+i*0.12);
                o.connect(eg);eg.connect(audioCtx.destination);o.start(audioCtx.currentTime+i*0.12);o.stop(audioCtx.currentTime+0.5+i*0.12);
            });
        }
    }

    // ─── DOM refs ───
    const menuEl     = document.getElementById('menu');
    const resultsEl  = document.getElementById('results');
    const fpsEl      = document.getElementById('fps-box');
    const statsEl    = document.getElementById('stats-box');
    const timerEl    = document.getElementById('timer-box');
    const chEl       = document.getElementById('crosshair');
    const hitmarker  = document.getElementById('hitmarker');
    const weaponEl   = document.getElementById('weapon');
    const lbEl       = document.getElementById('leaderboard');

    // ─── Config state ───
    let cfg = {
        mode:'flick', difficulty:'medium', roundTime:60,
        sensitivity:3.0
    };

    // Difficulty presets: [targetCount, speed multiplier, target-size multiplier, expire-time multiplier]
    const DIFF = {
        easy:   {count:3, speedMul:0.6, sizeMul:1.5, expireMul:1.6},
        medium: {count:5, speedMul:1.0, sizeMul:1.0, expireMul:1.0},
        hard:   {count:7, speedMul:1.6, sizeMul:0.6, expireMul:0.6}
    };

    // ─── Menu wiring ───
    function selectGroup(cls, el){
        document.querySelectorAll('.'+cls).forEach(b=>b.classList.remove('selected'));
        el.classList.add('selected');
    }
    document.querySelectorAll('.mode-btn').forEach(b=>b.addEventListener('click',()=>{selectGroup('mode-btn',b);cfg.mode=b.dataset.mode}));
    document.querySelectorAll('.diff-btn').forEach(b=>b.addEventListener('click',()=>{selectGroup('diff-btn',b);cfg.difficulty=b.dataset.diff}));
    document.querySelectorAll('.time-btn').forEach(b=>b.addEventListener('click',()=>{selectGroup('time-btn',b);cfg.roundTime=+b.dataset.time}));

    const sensIn=document.getElementById('sens'), svEl=document.getElementById('sv');
    sensIn.addEventListener('input',()=>{cfg.sensitivity=+sensIn.value;svEl.textContent=cfg.sensitivity.toFixed(1)});
    const volIn=document.getElementById('vol'), vvEl=document.getElementById('vv');
    volIn.addEventListener('input',()=>{vvEl.textContent=volIn.value+'%'});

    // ─── Crosshair customization ───
    const chColor=document.getElementById('ch-color');
    const chSz=document.getElementById('ch-sz'), chSzV=document.getElementById('ch-sz-v');
    const chTh=document.getElementById('ch-th'), chThV=document.getElementById('ch-th-v');
    const chGp=document.getElementById('ch-gp'), chGpV=document.getElementById('ch-gp-v');
    const chDt=document.getElementById('ch-dt'), chDtV=document.getElementById('ch-dt-v');
    const chOl=document.getElementById('ch-ol'), chOlV=document.getElementById('ch-ol-v');

    function updateCrosshair(){
        const color = chColor.value;
        const size  = +chSz.value;
        const thick = +chTh.value;
        const gap   = +chGp.value;
        const dot   = +chDt.value;
        const outline = +chOl.value;
        chSzV.textContent=size; chThV.textContent=thick; chGpV.textContent=gap; chDtV.textContent=dot; chOlV.textContent=outline;

        const lines = chEl.querySelectorAll('.ch-line');
        const lineLen = (size - gap*2 - thick) / 2;
        const outlineStr = outline > 0 ? `0 0 0 ${outline}px #000` : 'none';

        lines.forEach(l=>{
            l.style.background = color;
            l.style.boxShadow = outlineStr;
        });
        // Top
        lines[0].style.width=thick+'px'; lines[0].style.height=Math.max(0,lineLen)+'px';
        lines[0].style.marginBottom=gap+'px';
        // Bottom
        lines[1].style.width=thick+'px'; lines[1].style.height=Math.max(0,lineLen)+'px';
        lines[1].style.marginTop=gap+'px';
        // Left
        lines[2].style.height=thick+'px'; lines[2].style.width=Math.max(0,lineLen)+'px';
        lines[2].style.marginRight=gap+'px';
        // Right
        lines[3].style.height=thick+'px'; lines[3].style.width=Math.max(0,lineLen)+'px';
        lines[3].style.marginLeft=gap+'px';

        const dotEl = chEl.querySelector('.ch-dot');
        if(dot>0){
            dotEl.style.display='block'; dotEl.style.width=dot+'px'; dotEl.style.height=dot+'px';
            dotEl.style.background=color; dotEl.style.boxShadow=outlineStr;
        } else dotEl.style.display='none';
    }
    [chColor,chSz,chTh,chGp,chDt,chOl].forEach(el=>el.addEventListener('input',updateCrosshair));
    updateCrosshair();

    // ─── Leaderboard ───
    function loadLB(){ try{return JSON.parse(localStorage.getItem('aimtrainer_lb'))||[]}catch(e){return[]} }
    function saveLB(lb){ localStorage.setItem('aimtrainer_lb',JSON.stringify(lb)); }
    function renderLB(){
        const lb=loadLB();
        if(!lb.length){ lbEl.innerHTML='<div class="lb-entry" style="color:#555">No scores yet</div>'; return;}
        lbEl.innerHTML=lb.slice(0,10).map((e,i)=>
            `<div class="lb-entry"><span class="lb-rank">#${i+1}</span><span class="lb-mode">${e.mode} / ${e.diff}</span><span class="lb-score">${e.score}</span><span class="lb-acc">${e.acc}%</span></div>`
        ).join('');
    }
    function addScore(score,acc){
        const lb=loadLB();
        lb.push({mode:cfg.mode,diff:cfg.difficulty,score,acc,time:Date.now()});
        lb.sort((a,b)=>b.score-a.score);
        if(lb.length>50)lb.length=50;
        saveLB(lb); renderLB();
    }
    document.getElementById('clear-lb').addEventListener('click',()=>{localStorage.removeItem('aimtrainer_lb');renderLB()});
    renderLB();

    // ─── THREE.JS Setup ───
    const renderer = new THREE.WebGLRenderer({antialias:false, powerPreference:'high-performance'});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.shadowMap.enabled = false;
    document.body.insertBefore(renderer.domElement, document.body.firstChild);

    const scene  = new THREE.Scene();
    scene.background = new THREE.Color(0x111118);
    scene.fog = new THREE.Fog(0x111118, 40, 80);

    const camera = new THREE.PerspectiveCamera(80, window.innerWidth/window.innerHeight, 0.1, 200);
    camera.position.set(0, 2, 0);

    window.addEventListener('resize', ()=>{
        camera.aspect=window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── Lighting ───
    scene.add(new THREE.AmbientLight(0x445566, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 15, 10);
    scene.add(dirLight);
    const pointLight = new THREE.PointLight(0xff4455, 0.3, 40);
    pointLight.position.set(0, 8, 0);
    scene.add(pointLight);

    // ─── Environment: Floor ───
    const floorGeo = new THREE.PlaneGeometry(80, 80, 40, 40);
    const floorMat = new THREE.MeshStandardMaterial({color:0x181820, roughness:0.9});
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI/2;
    floor.position.y = 0;
    scene.add(floor);

    // ─── Environment: Back wall ───
    const wallGeo = new THREE.PlaneGeometry(80, 20);
    const wallMat = new THREE.MeshStandardMaterial({color:0x14141c, roughness:0.8});
    const backWall = new THREE.Mesh(wallGeo, wallMat);
    backWall.position.set(0, 10, -25);
    scene.add(backWall);

    // Side walls
    const leftWall = new THREE.Mesh(wallGeo, wallMat);
    leftWall.position.set(-25, 10, 0);
    leftWall.rotation.y = Math.PI/2;
    scene.add(leftWall);
    const rightWall = new THREE.Mesh(wallGeo, wallMat);
    rightWall.position.set(25, 10, 0);
    rightWall.rotation.y = -Math.PI/2;
    scene.add(rightWall);

    // Grid lines on floor
    const gridHelper = new THREE.GridHelper(80, 80, 0x222233, 0x191925);
    scene.add(gridHelper);

    // ─── Target management ───
    const targetGroup = new THREE.Group();
    scene.add(targetGroup);

    const raycaster = new THREE.Raycaster();
    const screenCenter = new THREE.Vector2(0, 0);

    let targets = [];   // {mesh, vx, vy, vz, tracking, age, maxAge, radius}
    let running = false;
    let hits = 0, misses = 0, score = 0;
    let roundTimer = 0;
    let yaw = 0, pitch = 0;

    // Shared geometries & materials (perf)
    const sphereGeo = new THREE.SphereGeometry(1, 20, 16);
    const targetMatBase = new THREE.MeshStandardMaterial({color:0xff2244, emissive:0xff2244, emissiveIntensity:0.25, roughness:0.4, metalness:0.1});

    function rand(a,b){return a+Math.random()*(b-a)}

    function makeTargetMat(tracking){
        return new THREE.MeshStandardMaterial({
            color: tracking ? 0xff8800 : 0xff2244,
            emissive: tracking ? 0xff6600 : 0xff2244,
            emissiveIntensity: 0.3,
            roughness: 0.4,
            metalness: 0.1
        });
    }

    // Inner rings on targets (child mesh)
    const ringGeo = new THREE.TorusGeometry(1, 0.05, 8, 32);
    const ringMat = new THREE.MeshBasicMaterial({color:0xffffff});

    function spawnTarget(forceTracking){
        const d = DIFF[cfg.difficulty];
        const baseR = rand(0.3, 0.7) * d.sizeMul;

        // Spawn in front of player within arena
        const x = rand(-18, 18);
        const y = rand(1.5, 8);
        const z = rand(-20, -6);

        const isTracking = forceTracking !== undefined ? forceTracking
            : cfg.mode==='tracking' || cfg.mode==='strafing' ? true
                : cfg.mode==='flick' ? false
                    : Math.random()<0.5;

        const mesh = new THREE.Mesh(sphereGeo, makeTargetMat(isTracking));
        mesh.scale.set(baseR, baseR, baseR);
        mesh.position.set(x, y, z);

        // Inner ring
        const ring = new THREE.Mesh(ringGeo, ringMat.clone());
        ring.scale.set(0.55 * baseR, 0.55 * baseR, 0.55 * baseR);
        ring.lookAt(camera.position);
        mesh.add(ring);

        const t = {
            mesh, radius:baseR, tracking:isTracking,
            vx:0, vy:0, vz:0,
            age:0, maxAge: rand(2500,5000) * d.expireMul
        };

        if(isTracking){
            const speed = rand(3,8) * d.speedMul;
            if(cfg.mode === 'strafing'){
                // Strafing: primarily horizontal, sometimes with direction changes
                t.vx = (Math.random()<0.5?1:-1) * speed;
                t.vy = rand(-0.5,0.5) * d.speedMul;
                t.vz = 0;
                t.strafeTimer = 0;
                t.strafeInterval = rand(800,2500) / d.speedMul;
            } else {
                const theta = Math.random()*Math.PI*2;
                const phi = rand(-0.4,0.4);
                t.vx = Math.cos(theta)*speed;
                t.vy = Math.sin(phi)*speed*0.5;
                t.vz = Math.sin(theta)*speed*0.3;
            }
        }

        targetGroup.add(mesh);
        targets.push(t);
    }

    function removeTarget(idx){
        targetGroup.remove(targets[idx].mesh);
        targets[idx].mesh.geometry !== sphereGeo || null; // shared, don't dispose
        targets.splice(idx,1);
    }

    function clearTargets(){
        for(const t of targets) targetGroup.remove(t.mesh);
        targets=[];
    }

    // ─── Pointer lock & input ───
    function lockPointer(){ renderer.domElement.requestPointerLock(); }

    document.addEventListener('pointerlockchange', ()=>{
        if(!document.pointerLockElement && running) stopGame();
    });

    document.addEventListener('mousemove', (e)=>{
        if(!running) return;
        const s = cfg.sensitivity * 0.002;
        yaw   -= e.movementX * s;
        pitch -= e.movementY * s;
        pitch = Math.max(-Math.PI/2+0.01, Math.min(Math.PI/2-0.01, pitch));
    });

    let hmTimeout = 0;
    function showHitmarker(){
        hitmarker.classList.add('show');
        clearTimeout(hmTimeout);
        hmTimeout = setTimeout(()=>hitmarker.classList.remove('show'), 100);
    }

    function recoilWeapon(){
        weaponEl.classList.add('recoil');
        setTimeout(()=>weaponEl.classList.remove('recoil'), 60);
    }

    // Muzzle flash
    const flashGeo = new THREE.SphereGeometry(0.15,8,8);
    const flashMat = new THREE.MeshBasicMaterial({color:0xffdd44, transparent:true, opacity:0});
    const muzzleFlash = new THREE.Mesh(flashGeo, flashMat);
    scene.add(muzzleFlash);
    let flashTimer = 0;

    document.addEventListener('mousedown', (e)=>{
        if(!running || e.button!==0) return;

        playSound('shoot');
        recoilWeapon();

        // Muzzle flash at gun position in world
        const gunWorldPos = new THREE.Vector3(0.4, 1.5, -0.8);
        gunWorldPos.applyQuaternion(camera.quaternion).add(camera.position);
        muzzleFlash.position.copy(gunWorldPos);
        flashMat.opacity = 1;
        flashTimer = 0.04;

        // Raycast from camera center
        raycaster.setFromCamera(screenCenter, camera);
        const meshes = targets.map(t=>t.mesh);
        const intersects = raycaster.intersectObjects(meshes, true);

        if(intersects.length > 0){
            // Find which target
            let hitMesh = intersects[0].object;
            while(hitMesh.parent && hitMesh.parent !== targetGroup) hitMesh = hitMesh.parent;
            const idx = targets.findIndex(t=>t.mesh===hitMesh);
            if(idx>=0){
                hits++;
                score += Math.round(100 * (1/targets[idx].radius) * (DIFF[cfg.difficulty].speedMul));
                playSound('hit');
                showHitmarker();
                removeTarget(idx);
                spawnTarget();
            } else {
                misses++;
                playSound('miss');
            }
        } else {
            misses++;
            playSound('miss');
        }
        updateStats();
    });

    // ─── Game flow ───
    function startGame(){
        cfg.sensitivity = +sensIn.value;
        hits=0; misses=0; score=0;
        yaw=0; pitch=0;
        camera.position.set(0,2,0);
        roundTimer = cfg.roundTime;

        clearTargets();
        const d = DIFF[cfg.difficulty];
        for(let i=0;i<d.count;i++) spawnTarget();

        running = true;
        menuEl.classList.add('hidden');
        resultsEl.classList.add('hidden');
        chEl.style.display='block';
        weaponEl.style.display='block';
        timerEl.style.display = cfg.roundTime > 0 ? 'block' : 'none';
        lockPointer();
        updateStats();
    }

    function stopGame(){
        running = false;
        chEl.style.display='none';
        if(document.pointerLockElement) document.exitPointerLock();
        menuEl.classList.remove('hidden');
        timerEl.style.display='none';
    }

    function endRound(){
        running = false;
        chEl.style.display='none';
        if(document.pointerLockElement) document.exitPointerLock();
        timerEl.style.display='none';
        playSound('end');

        const total = hits+misses;
        const acc = total ? (hits/total*100).toFixed(1) : '0.0';

        if(cfg.roundTime > 0) addScore(score, acc);

        document.getElementById('res-title').textContent = cfg.roundTime > 0 ? '🏁 Round Complete!' : 'Session Over';
        document.getElementById('res-body').innerHTML =
            `<b>Score:</b> ${score}<br><b>Hits:</b> ${hits}<br><b>Misses:</b> ${misses}<br><b>Accuracy:</b> ${acc}%<br><b>Mode:</b> ${cfg.mode} / ${cfg.difficulty}`;
        resultsEl.classList.remove('hidden');
    }

    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('res-menu').addEventListener('click', ()=>{ resultsEl.classList.add('hidden'); menuEl.classList.remove('hidden'); renderLB(); });
    document.getElementById('res-retry').addEventListener('click', ()=>{ resultsEl.classList.add('hidden'); startGame(); });

    document.addEventListener('keydown', (e)=>{
        if(e.key==='Escape' && running) { e.preventDefault(); stopGame(); }
    });

    // ─── Stats ───
    function updateStats(){
        const total=hits+misses;
        const acc=total?(hits/total*100).toFixed(1)+'%':'—';
        statsEl.textContent=`Score: ${score}  |  Hits: ${hits}  |  Misses: ${misses}  |  Accuracy: ${acc}`;
    }

    // ─── FPS Counter ───
    let frames=0, lastFpsT=performance.now(), fps=0;

    // ─── Main loop ───
    let lastT = performance.now();

    function loop(now){
        requestAnimationFrame(loop);
        const dt = Math.min((now-lastT)/1000, 0.05);
        lastT = now;

        // FPS
        frames++;
        if(now - lastFpsT >= 400){
            fps = Math.round(frames/((now-lastFpsT)/1000));
            fpsEl.textContent = 'FPS: '+fps;
            fpsEl.style.color = fps>=144?'#0f0':fps>=60?'#ff0':'#f44';
            frames=0; lastFpsT=now;
        }

        if(!running){ renderer.render(scene,camera); return; }

        // ── Timer ──
        if(cfg.roundTime > 0){
            roundTimer -= dt;
            timerEl.textContent = Math.max(0, roundTimer).toFixed(1);
            if(roundTimer <= 0){ endRound(); return; }
        }

        // ── Camera rotation ──
        const qYaw   = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), yaw);
        const qPitch = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), pitch);
        camera.quaternion.copy(qYaw).multiply(qPitch);

        // ── Update targets ──
        const d = DIFF[cfg.difficulty];
        for(let i=targets.length-1; i>=0; i--){
            const t=targets[i];
            t.age += dt*1000;

            if(t.tracking){
                // Strafing direction changes
                if(cfg.mode==='strafing'){
                    t.strafeTimer = (t.strafeTimer||0) + dt*1000;
                    if(t.strafeTimer > t.strafeInterval){
                        t.strafeTimer = 0;
                        t.vx = -t.vx + rand(-1,1);
                        t.vy = rand(-1,1) * d.speedMul;
                        t.strafeInterval = rand(600,2000) / d.speedMul;
                    }
                }

                t.mesh.position.x += t.vx * dt;
                t.mesh.position.y += t.vy * dt;
                t.mesh.position.z += t.vz * dt;

                // Bounce off arena bounds
                const p=t.mesh.position, r=t.radius;
                if(p.x - r < -20){ p.x = -20+r; t.vx = Math.abs(t.vx); }
                if(p.x + r >  20){ p.x =  20-r; t.vx = -Math.abs(t.vx); }
                if(p.y - r <  1) { p.y =  1+r;  t.vy = Math.abs(t.vy); }
                if(p.y + r > 10) { p.y = 10-r;  t.vy = -Math.abs(t.vy); }
                if(p.z - r < -24){ p.z = -24+r;  t.vz = Math.abs(t.vz); }
                if(p.z + r > -4) { p.z = -4-r;  t.vz = -Math.abs(t.vz); }
            }

            // Face inner ring toward camera
            if(t.mesh.children[0]) t.mesh.children[0].lookAt(camera.position);

            // Expire flick targets
            if(!t.tracking && t.age > t.maxAge){
                playSound('expire');
                misses++;
                removeTarget(i);
                spawnTarget();
                updateStats();
            }
        }

        // Keep target count stable
        while(targets.length < d.count) spawnTarget();

        // Muzzle flash fade
        if(flashTimer > 0){
            flashTimer -= dt;
            flashMat.opacity = Math.max(0, flashTimer/0.04);
        }

        renderer.render(scene, camera);
    }

    requestAnimationFrame(loop);
</script>
</body>
</html>
